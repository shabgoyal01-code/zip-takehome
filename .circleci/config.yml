# Circle CI: runs on every push and every PR.
# Steps: checkout → cache restore → Linter (Spotless) → Unit tests → cache save → upload results.
# Free tier: https://circleci.com/pricing/

version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    working_directory: ~/project
    steps:
      - checkout:
          name: Checkout code

      - restore_cache:
          name: Restore Maven cache
          keys:
            - maven-v1-{{ checksum "pom.xml" }}
            - maven-v1-

      - run:
          name: Linter (Spotless)
          command: mvn spotless:check -B

      - run:
          name: Unit tests
          command: mvn test -B

      - save_cache:
          name: Save Maven cache
          paths:
            - ~/.m2
          key: maven-v1-{{ checksum "pom.xml" }}

      - store_test_results:
          name: Upload test results
          path: target/surefire-reports

workflows:
  version: 2
  build-and-test:
    jobs:
      - build:
          filters:
            branches:
              ignore:
                - gh-pages
