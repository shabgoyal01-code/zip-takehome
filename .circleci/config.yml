# Circle CI: runs on every push and every PR.
# Runs: Spotless (linter) + unit tests via mvn verify.
# Free tier: https://circleci.com/pricing/

version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    working_directory: ~/project
    steps:
      - checkout

      - restore_cache:
          keys:
            - maven-v1-{{ checksum "pom.xml" }}
            - maven-v1-

      - run:
          name: Build and verify (Spotless + tests)
          command: mvn clean verify -B

      - save_cache:
          paths:
            - ~/.m2
          key: maven-v1-{{ checksum "pom.xml" }}

      - store_test_results:
          path: target/surefire-reports

workflows:
  version: 2
  build-and-test:
    jobs:
      - build:
          filters:
            branches:
              ignore:
                - gh-pages
